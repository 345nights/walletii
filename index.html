<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Walletii</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Manrope', sans-serif;
    background: #0d1e24;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .page {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #0d1e24;
  }

  /* ── Nav ── */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 24px 0;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    color: #00e5cc;
    letter-spacing: -0.5px;
  }

  .lang-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: white;
    border: none;
    border-radius: 30px;
    padding: 9px 16px;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #00c4ae;
    cursor: pointer;
    white-space: nowrap;
  }

  /* ── Cards ── */
  .cards-section {
    padding: 40px 24px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .currency-row {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .currency-card {
    background: white;
    border-radius: 20px;
    padding: 20px 16px 16px;
    width: 150px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  }

  .flag-container {
    width: 68px;
    height: 46px;
    border-radius: 9px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .flag-oman {
    width: 100%; height: 100%;
    position: relative;
    display: flex; flex-direction: column;
    background: #DB161B;
  }
  .flag-oman .stripe-white { flex: 1; background: white; margin-left: 20px; }
  .flag-oman .stripe-red   { flex: 1; background: #DB161B; margin-left: 20px; }
  .flag-oman .stripe-green { flex: 1; background: #008000; margin-left: 20px; }
  .flag-oman .v-red {
    position: absolute; left: 0; top: 0; bottom: 0; width: 20px;
    background: #DB161B;
    display: flex; align-items: center; justify-content: center;
  }
  .flag-oman .emblem { color: white; font-size: 10px; }

  .flag-india { width: 100%; height: 100%; display: flex; flex-direction: column; }
  .flag-india .ind-o { flex: 1; background: #FF9933; }
  .flag-india .ind-w { flex: 1; background: white; display: flex; align-items: center; justify-content: center; }
  .flag-india .ind-g { flex: 1; background: #138808; }
  .chakra { width: 14px; height: 14px; border: 2px solid #000088; border-radius: 50%; }

  .country-name { font-size: 15px; font-weight: 700; color: #00b4a0; }

  .amount-box {
    background: #f3f4f6;
    border-radius: 10px;
    padding: 10px 12px;
    width: 100%;
    font-size: 16px;
    font-weight: 700;
    color: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .arrow-circle {
    width: 42px; height: 42px;
    background: #00e5cc;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin: 0 -5px;
    z-index: 2;
    box-shadow: 0 4px 16px rgba(0,229,204,0.4);
  }
  .arrow-circle svg {
    width: 20px; height: 20px;
    fill: none; stroke: #0d1e24;
    stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
  }

  .powered-by {
    margin-top: 20px;
    background: white;
    border-radius: 30px;
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #6b7280;
    font-weight: 500;
  }
  .mg-logo { display: flex; align-items: center; gap: 5px; font-weight: 700; color: #e02d2d; font-size: 13px; }

  /* This spacer fills all the empty space between cards and bottom text */
  .spacer { flex: 1; }

  .bottom {
    padding: 0 24px 48px;
  }

  .tagline {
    font-size: 26px;
    font-weight: 800;
    color: white;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 40px;
    letter-spacing: -0.3px;
  }

  .continue-btn {
    width: 100%;
    background: #00e5cc;
    color: #0d1e24;
    border: none;
    border-radius: 50px;
    padding: 20px;
    font-family: 'Manrope', sans-serif;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,229,204,0.35);
  }
</style>
</head>
<body>
<div class="page">

  <nav>
    <div class="logo">walletii</div>
    <button class="lang-btn">
      <span>🌐</span>
      <span>हिंदी / العربية</span>
    </button>
  </nav>

  <div class="cards-section">
    <div class="currency-row">

      <div class="currency-card">
        <div class="flag-container">
          <div class="flag-oman">
            <div class="v-red"><span class="emblem">✦</span></div>
            <div class="stripe-white"></div>
            <div class="stripe-red"></div>
            <div class="stripe-green"></div>
          </div>
        </div>
        <div class="country-name">Oman</div>
        <div class="amount-box">100 <strong>OMR</strong></div>
      </div>

      <div class="arrow-circle">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </div>

      <div class="currency-card">
        <div class="flag-container">
          <div class="flag-india">
            <div class="ind-o"></div>
            <div class="ind-w"><div class="chakra"></div></div>
            <div class="ind-g"></div>
          </div>
        </div>
        <div class="country-name">India</div>
        <div class="amount-box">21 691 <strong>INR</strong> <span style="color:#555;font-size:12px;">∨</span></div>
      </div>

    </div>

    <div class="powered-by">
      <span>Powered by</span>
      <div class="mg-logo">🔴 MoneyGram</div>
    </div>
  </div>

  <!-- Pushes bottom section down -->
  <div class="spacer"></div>

  <div class="bottom">
    <p class="tagline">Send money to 200+ countries while enjoying great rates and low fees</p>
    <button class="continue-btn">Continue</button>
  </div>

</div>
</body>
</html>
